<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Find Your Ski Resort</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #002147;
      color: white;
      text-align: center;
      padding: 40px 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    p { color: #ccc; }
    .question { margin: 30px auto; max-width: 500px; }
    .question h3 { margin-bottom: 15px; }
    button {
      background: white;
      color: #002147;
      border: none;
      padding: 10px 20px;
      margin: 8px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background: #add8ff; }
    #result {
      display: none;
      background: white;
      color: #002147;
      border-radius: 10px;
      padding: 30px;
      max-width: 500px;
      margin: 30px auto;
    }
    #result h2 { font-size: 1.8rem; }
    #result p { color: #444; }
    #restart {
      background: #002147;
      color: white;
      border: 2px solid white;
      padding: 10px 24px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 16px;
    }
    #navbar {
      text-align: left;
      margin-bottom: 30px;
    }
    #navbar a {
      color: #add8ff;
      text-decoration: none;
      margin-right: 20px;
    }
  </style>
</head>
<body>

<div id="navbar">
  <a href="index.html">Home</a>
  <a href="scratch.html">Ski Page</a>
</div>

<h1>Which Colorado Ski Resort Is Right For You?</h1>
<p>Answer 3 quick questions to find your perfect resort</p>

<div id="quiz">

  <div class="question" id="q1">
    <h3>1. What kind of skier are you?</h3>
    <button onclick="answer('beginner')">Beginner</button>
    <button onclick="answer('intermediate')">Intermediate</button>
    <button onclick="answer('expert')">Expert</button>
  </div>

  <div class="question" id="q2" style="display:none;">
    <h3>2. What do you love most about a ski trip?</h3>
    <button onclick="answer('town')">Exploring the town</button>
    <button onclick="answer('powder')">Fresh powder runs</button>
    <button onclick="answer('views')">Amazing views</button>
  </div>

  <div class="question" id="q3" style="display:none;">
    <h3>3. How far are you willing to drive from Denver?</h3>
    <button onclick="answer('close')">Under 2 hours</button>
    <button onclick="answer('far')">I don't mind a longer drive</button>
  </div>

</div>

<div id="result">
  <h2 id="resort-name"></h2>
  <p id="resort-desc"></p>
  <button id="restart" onclick="restart()">Start Over</button>
</div>

<script>
  var answers = [];
  var step = 1;

  function answer(val) {
    answers.push(val);
    if (step === 1) {
      document.getElementById('q1').style.display = 'none';
      document.getElementById('q2').style.display = 'block';
      step = 2;
    } else if (step === 2) {
      document.getElementById('q2').style.display = 'none';
      document.getElementById('q3').style.display = 'block';
      step = 3;
    } else {
      document.getElementById('quiz').style.display = 'none';
      showResult();
    }
  }

  function showResult() {
    var resorts = {
      beginner: {
        name: "Breckenridge",
        desc: "Breckenridge is perfect for beginners with tons of easy runs, a fun town to explore, and great ski schools to help you improve."
      },
      intermediate: {
        name: "Vail",
        desc: "Vail is ideal for intermediate skiers with massive terrain, world famous back bowls, and something for every ability level."
      },
      expert: {
        name: "Telluride",
        desc: "Telluride is a dream for expert skiers with steep challenging runs, incredible views, and a stunning mountain town."
      }
    };

    var pick = answers[0];
    var resort = resorts[pick];

    document.getElementById('resort-name').textContent = "Your Resort: " + resort.name;
    document.getElementById('resort-desc').textContent = resort.desc;
    document.getElementById('result').style.display = 'block';
  }

  function restart() {
    answers = [];
    step = 1;
    document.getElementById('quiz').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('q1').style.display = 'block';
    document.getElementById('q2').style.display = 'none';
    document.getElementById('q3').style.display = 'none';
  }
</script>

</body>
</html>
